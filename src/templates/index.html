<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>Busca de Empenhos</title>
    <!-- Google Fonts - Raleway (fallback for Rawline) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Design System CSS (provides CSS variables + utility classes) -->
    <link rel="stylesheet" href="/static/css/design-system.css" />
    <!-- Tailwind for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: "var(--color-surface)",
              "surface-dim": "var(--color-surface-dim)",
              "surface-container": "var(--color-surface-container)",
              "surface-container-high": "var(--color-surface-container-high)",
              "surface-container-highest":
                "var(--color-surface-container-highest)",
              "on-surface": "var(--color-on-surface)",
              "on-surface-variant": "var(--color-on-surface-variant)",
              primary: "var(--color-primary)",
              "on-primary": "var(--color-on-primary)",
              "primary-container": "var(--color-primary-container)",
              "on-primary-container": "var(--color-on-primary-container)",
              secondary: "var(--color-secondary)",
              error: "var(--color-error)",
              background: "var(--color-background)",
            },
            fontFamily: {
              rawline: ["Rawline", "Raleway", "sans-serif"],
            },
            borderRadius: {
              sm: "2px",
              DEFAULT: "3px",
              md: "4px",
              lg: "6px",
              xl: "12px",
            },
            boxShadow: {
              card: "0 6px 6px rgba(0, 0, 0, 0.16)",
              elevated: "0 8px 16px rgba(0, 0, 0, 0.2)",
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="bg-background min-h-screen flex items-center justify-center p-6 font-rawline"
  >
    <div class="w-full max-w-lg">
      <!-- Header Card -->
      <div class="bg-surface-dim rounded-lg shadow-card p-6 mb-6">
        <div
          class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4"
        >
          <div>
            <h1 class="text-headline-md text-on-surface font-semibold">
              Portal Transparência Utils
            </h1>
            <p class="text-body-md text-on-surface-variant mt-1">
              Busca de Empenhos Governamentais
            </p>
          </div>
          <div class="flex gap-2">
            <a href="/dashboard" class="btn btn-ghost">Painel</a>
            <a href="/searches" class="btn btn-ghost">Buscas →</a>
          </div>
        </div>
      </div>

      <!-- Form Card (using design-system card-elevated pattern) -->
      <div class="card-elevated p-8">
        <form action="/searches" method="POST" class="space-y-6">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <!-- CNPJ Field -->
          <div>
            <label
              for="cnpj"
              class="block font-label-sm text-on-surface uppercase mb-2"
            >
              CNPJ do Fornecedor
            </label>
            <input
              type="text"
              id="cnpj"
              name="cnpj"
              value="47.149.673/0001-71"
              class="input-field"
              placeholder="00.000.000/0000-00"
              required
            />
            <p class="font-label-sm text-on-surface-variant mt-2">
              CNPJ da empresa para buscar empenhos
            </p>
          </div>

          <!-- Pregão Field -->
          <!--  <div>   -->
          <!--  <label   -->
          <!--      for="pregao"   -->
          <!--      class="block font-label-sm text-on-surface uppercase mb-2"   -->
          <!--    >   -->
          <!--      Número do Pregão   -->
          <!--    </label>   -->
          <!--    <input   -->
          <!--      type="text"   -->
          <!--      id="pregao"   -->
          <!--      name="pregao"   -->
          <!--      value=""   -->
          <!--      placeholder="Ex: 90021"   -->
          <!--      class="input-field"   -->
          <!--    />   -->
          <!--    <p class="font-label-sm text-on-surface-variant mt-2">   -->
          <!--      Deixe em branco para listar todos os empenhos   -->
          <!--    </p>   -->
          <!--  </div>   -->
          <!-- Divider -->
          <hr class="border-surface-container-high" />

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-full">
            Buscar Empenhos
          </button>
        </form>
      </div>

      <!-- Footer Info -->
      <div class="mt-6 text-center">
        <p class="font-label-sm text-on-surface-variant">
          Dados extraídos do Portal da Transparência
        </p>
      </div>
    </div>
  </body>
</html>
