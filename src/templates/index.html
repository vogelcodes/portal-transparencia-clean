<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca de Empenhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: "#FFFFFF",
              "surface-dim": "#FAFAFA",
              "surface-container": "#F8F8F8",
              "surface-container-high": "#F0F0F0",
              "surface-container-highest": "#E8E8E8",
              "on-surface": "#1a1a1a",
              "on-surface-variant": "#333333",
              primary: "#1351B4",
              "on-primary": "#FFFFFF",
              "primary-container": "#E8F0FE",
              "on-primary-container": "#0D47A1",
              secondary: "#455A64",
              error: "#B00020",
              background: "#FFFFFF",
            },
            fontFamily: {
              rawline: ["Rawline", "Raleway", "sans-serif"],
            },
            borderRadius: {
              sm: "2px",
              DEFAULT: "3px",
              md: "4px",
              lg: "6px",
              xl: "12px",
            },
            boxShadow: {
              card: "0 6px 6px rgba(0, 0, 0, 0.16)",
              elevated: "0 8px 16px rgba(0, 0, 0, 0.2)",
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="bg-background min-h-screen flex items-center justify-center p-6 font-rawline"
  >
    <!-- Google Fonts - Rawline -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <div class="w-full max-w-lg">
      <!-- Header Card -->
      <div class="bg-surface-dim rounded-lg shadow-card p-6 mb-6">
        <div
          class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4"
        >
          <div>
            <h1 class="text-headline-md text-on-surface font-semibold">
              Portal Transparência Utils
            </h1>
            <p class="text-body-md text-on-surface-variant mt-1">
              Busca de Empenhos Governamentais
            </p>
          </div>
          <a
            href="/searches"
            class="text-label-sm text-primary hover:text-on-primary-container font-medium px-4 py-2 rounded-md hover:bg-primary-container transition-colors"
          >
            Minhas buscas →
          </a>
        </div>
      </div>

      <!-- Form Card -->
      <div class="bg-surface rounded-lg shadow-elevated p-8">
        <form action="/searches" method="POST" class="space-y-6">
          <!-- CNPJ Field -->
          <div>
            <label
              for="cnpj"
              class="block text-label-sm text-on-surface font-semibold uppercase tracking-wide mb-2"
            >
              CNPJ do Fornecedor
            </label>
            <input
              type="text"
              id="cnpj"
              name="cnpj"
              value="47.149.673/0001-71"
              class="w-full bg-surface-container text-on-surface text-body-md rounded-md border border-on-surface-variant px-4 py-3 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-colors"
              placeholder="00.000.000/0000-00"
              required
            />
            <p class="text-label-sm text-on-surface-variant mt-2">
              CNPJ da empresa para buscar empenhos
            </p>
          </div>

          <!-- Pregão Field -->
          <div>
            <label
              for="pregao"
              class="block text-label-sm text-on-surface font-semibold uppercase tracking-wide mb-2"
            >
              Número do Pregão
            </label>
            <input
              type="text"
              id="pregao"
              name="pregao"
              value=""
              placeholder="Ex: 90021"
              class="w-full bg-surface-container text-on-surface text-body-md rounded-md border border-on-surface-variant px-4 py-3 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-colors placeholder:text-on-surface-variant/60"
            />
            <p class="text-label-sm text-on-surface-variant mt-2">
              Deixe em branco para listar todos os empenhos
            </p>
          </div>

          <!-- Divider -->
          <hr class="border-surface-container-high" />

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full bg-primary text-on-primary text-label-sm font-semibold uppercase tracking-wide rounded-md px-6 py-3 hover:bg-on-primary-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-colors shadow-card"
          >
            Buscar Empenhos
          </button>
        </form>
      </div>

      <!-- Footer Info -->
      <div class="mt-6 text-center">
        <p class="text-label-sm text-on-surface-variant">
          Dados extraídos do Portal da Transparência
        </p>
      </div>
    </div>
  </body>
</html>
