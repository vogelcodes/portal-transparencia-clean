<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Portal Transparência Utils</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: "#FFFFFF",
              "surface-dim": "#FAFAFA",
              "surface-container": "#F8F8F8",
              "on-surface": "#1a1a1a",
              "on-surface-variant": "#333333",
              primary: "#1351B4",
              "on-primary": "#FFFFFF",
              "primary-container": "#E8F0FE",
              "on-primary-container": "#0D47A1",
              error: "#B00020",
              "error-container": "#FDECEA",
              "on-error-container": "#B00020",
              background: "#FFFFFF",
            },
            fontFamily: {
              rawline: ["Raleway", "sans-serif"],
            },
            borderRadius: {
              sm: "2px",
              DEFAULT: "3px",
              md: "4px",
              lg: "6px",
              xl: "12px",
            },
            boxShadow: {
              card: "0 6px 6px rgba(0, 0, 0, 0.16)",
              elevated: "0 8px 16px rgba(0, 0, 0, 0.2)",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-primary min-h-screen flex items-center justify-center p-4 font-rawline"
  >
    <div
      class="bg-surface rounded-xl shadow-elevated w-full max-w-md overflow-hidden"
    >
      <div class="p-8">
        <div class="text-center mb-8">
          <h1 class="text-headline-lg text-on-surface font-semibold">
            Portal Transparência
          </h1>
          <p class="text-body-md text-on-surface-variant mt-2">
            Faça login para continuar
          </p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %}
        <div class="mb-4">
          {% for category, message in messages %}
          <div
            class="p-4 rounded-md mb-2 {% if category == 'error' %}bg-error-container text-on-error-container border border-error {% elif category == 'success' %}bg-green-100 text-green-700 border border-green-200 {% else %}bg-primary-container text-on-primary-container border border-primary{% endif %}"
          >
            {{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %} {% endwith %}

        <form id="loginForm" method="POST" class="space-y-6">
          <div>
            <label
              class="block text-label-sm text-on-surface font-semibold uppercase tracking-wide mb-2"
              >Usuário</label
            >
            <input
              type="text"
              name="username"
              id="username"
              required
              class="w-full px-4 py-3 rounded-md border border-on-surface-variant bg-surface-container text-on-surface text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
              placeholder="Seu usuário"
            />
          </div>

          <div>
            <label
              class="block text-label-sm text-on-surface font-semibold uppercase tracking-wide mb-2"
              >Senha</label
            >
            <input
              type="password"
              name="password"
              id="password"
              required
              class="w-full px-4 py-3 rounded-md border border-on-surface-variant bg-surface-container text-on-surface text-body-md focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
              placeholder="••••••••"
            />
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center">
              <input
                type="checkbox"
                name="remember_me"
                class="w-4 h-4 text-primary rounded border-on-surface-variant focus:ring-primary"
              />
              <span class="ml-2 text-body-md text-on-surface-variant"
                >Lembrar-me</span
              >
            </label>
            <a
              href="#"
              class="text-label-sm text-primary hover:text-on-primary-container"
              >Esqueceu a senha?</a
            >
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="w-full bg-primary text-on-primary py-3 rounded-md text-label-sm font-semibold uppercase tracking-wide hover:bg-on-primary-container transition shadow-card"
          >
            Entrar
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-body-md text-on-surface-variant">
            Não tem conta?
            <a
              href="{{ url_for('auth.register') }}"
              class="text-primary hover:text-on-primary-container font-semibold"
            >
              Cadastre-se
            </a>
          </p>
        </div>
      </div>

      <div class="bg-surface-dim px-8 py-4 border-t border-surface-container">
        <a
          href="{{ url_for('index') }}"
          class="text-label-sm text-on-surface-variant hover:text-on-surface"
        >
          ← Voltar para busca
        </a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const btn = document.getElementById("submitBtn");
          const form = this;
          const formData = new FormData(form);

          btn.disabled = true;
          btn.textContent = "Entrando...";

          try {
            const response = await fetch('{{ url_for("auth.login") }}', {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                username: formData.get("username"),
                password: formData.get("password"),
                remember_me: formData.get("remember_me") === "on",
              }),
            });

            const data = await response.json();

            if (response.ok && data.success) {
              if (data.token) {
                localStorage.setItem("auth_token", data.token);
                localStorage.setItem("user_data", JSON.stringify(data.user));
              }
              window.location.href = data.redirect || "/";
            } else {
              alert(data.error || "Erro ao fazer login");
              btn.disabled = false;
              btn.textContent = "Entrar";
            }
          } catch (error) {
            console.error("Login error:", error);
            alert("Erro ao fazer login. Tente novamente.");
            btn.disabled = false;
            btn.textContent = "Entrar";
          }
        });
    </script>
  </body>
</html>
