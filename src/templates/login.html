<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Transparência Utils</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Portal Transparência</h1>
                <p class="text-gray-500 mt-2">Faça login para continuar</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="mb-4">
                        {% for category, message in messages %}
                            <div class="p-4 rounded-lg mb-2 
                                {% if category == 'error' %}bg-red-100 text-red-700 border border-red-200
                                {% elif category == 'success' %}bg-green-100 text-green-700 border border-green-200
                                {% else %}bg-blue-100 text-blue-700 border border-blue-200{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form id="loginForm" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Usuário</label>
                    <input type="text" name="username" id="username" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                        placeholder="Seu usuário">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" name="password" id="password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                        placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember_me" class="w-4 h-4 text-purple-600 rounded border-gray-300 focus:ring-purple-500">
                        <span class="ml-2 text-sm text-gray-600">Lembrar-me</span>
                    </label>
                    <a href="#" class="text-sm text-purple-600 hover:text-purple-800">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" id="submitBtn"
                    class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-blue-700 transition shadow-lg">
                    Entrar
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Não tem conta? 
                    <a href="{{ url_for('auth.register') }}" class="text-purple-600 hover:text-purple-800 font-semibold">
                        Cadastre-se
                    </a>
                </p>
            </div>
        </div>
        
        <div class="bg-gray-50 px-8 py-4 border-t border-gray-200">
            <a href="{{ url_for('index') }}" class="text-gray-500 hover:text-gray-700 text-sm">
                ← Voltar para busca
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const form = this;
            const formData = new FormData(form);
            
            btn.disabled = true;
            btn.textContent = 'Entrando...';
            
            try {
                const response = await fetch('{{ url_for("auth.login") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password'),
                        remember_me: formData.get('remember_me') === 'on'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_data', JSON.stringify(data.user));
                    }
                    window.location.href = data.redirect || '/';
                } else {
                    alert(data.error || 'Erro ao fazer login');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Erro ao fazer login. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
