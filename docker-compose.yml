version: "3.8"

services:
  web:
    image: "vogelcodes/portal-transp-web:latest"
    restart: always
    depends_on:
      - redis
      - postgres
    environment:
      - "SERVICE_FQDN_WEB=${SERVICE_FQDN_WEB:-http://localhost:5000}"
      - "APP_ENV=${APP_ENV:-production}"
      - "SECRET_KEY=${SECRET_KEY}"
      - "DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      - "REDIS_URL=${REDIS_URL:-redis://redis:6379/6}"
      - "API_KEY_PORTAL=${API_KEY_PORTAL}"
    volumes:
      - "portal_uploads:/app/uploads"
    expose:
      - 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    image: "vogelcodes/portal-transp-worker:latest"
    restart: always
    depends_on:
      - redis
      - postgres
    command: "celery -E -A src.tasks worker --loglevel=info"
    environment:
      - "APP_ENV=${APP_ENV:-production}"
      - "DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      - "REDIS_URL=${REDIS_URL:-redis://redis:6379/0}"
      - "API_KEY_PORTAL=${API_KEY_PORTAL}"

  redis:
    image: "redis:7-alpine"
    restart: always
    command: "redis-server --port 6379 --appendonly yes"
    volumes:
      - "portal_redis:/data"

  postgres:
    image: "postgres:16-alpine"
    restart: always
    environment:
      - "POSTGRES_USER=${POSTGRES_USER}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
      - "POSTGRES_DB=${POSTGRES_DB}"
    volumes:
      - "portal_postgres:/var/lib/postgresql/data"
    command:
      - postgres
      - "-c"
      - "max_connections=200"

volumes:
  portal_redis:
  portal_postgres:
  portal_uploads:
