<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Empenhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-center text-blue-600">Portal Transparência Utils</h1>
            <a href="/searches" class="text-sm text-blue-600 hover:underline">Minhas buscas</a>
        </div>
        <form action="/searches" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome da busca (opcional)</label>
                <input type="text" name="name" placeholder="Ex: Pregão 90021/2025"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">CNPJ</label>
                <input type="text" name="cnpj" value="47.149.673/0001-71"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border"
                    required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Pregão (Texto na Descrição)</label>
                <input type="text" name="pregao" value="" placeholder="Ex: 90021 (Opcional)"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                <p class="text-xs text-gray-500 mt-1">Deixe em branco para listar todos.</p>
            </div>
            <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Buscar Empenhos
            </button>
        </form>
    </div>
</body>

</html>
