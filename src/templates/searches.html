<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Buscas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-lg shadow-md p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Minhas Buscas</h1>
            <a href="/" class="inline-flex py-2 px-4 rounded-md text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">Nova Busca</a>
        </div>
        {% if not searches %}
        <p class="text-gray-500">Nenhuma busca ainda.</p>
        {% else %}
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nome</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">CNPJ</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pregão</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Criada</th>
                    <th></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                {% for s in searches %}
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm font-medium text-blue-600"><a href="/searches/{{ s.id }}" class="hover:underline">{{ s.name or ('#' ~ s.id) }}</a></td>
                    <td class="px-4 py-3 text-sm text-gray-700">{{ s.cnpj }}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">{{ s.pregao_filter or '—' }}</td>
                    <td class="px-4 py-3 text-sm">
                        <span class="px-2 py-1 rounded text-xs
                            {% if s.status == 'done' %}bg-green-100 text-green-800
                            {% elif s.status == 'error' %}bg-red-100 text-red-800
                            {% else %}bg-yellow-100 text-yellow-800{% endif %}">
                            {{ s.status }}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-500">{{ s.created_at.strftime('%d/%m/%Y %H:%M') }}</td>
                    <td class="px-4 py-3 text-right">
                        <form method="POST" action="/searches/{{ s.id }}" onsubmit="return confirm('Excluir busca?')" class="inline">
                            <input type="hidden" name="_method" value="DELETE">
                            <button class="text-xs text-red-600 hover:underline">Excluir</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}
    </div>
</body>
</html>
