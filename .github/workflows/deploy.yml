name: Build and Push to Docker Hub

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            vogelcodes/portal-transp-web:latest
            vogelcodes/portal-transp-web:${{ github.sha }}

  build-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            vogelcodes/portal-transp-worker:latest
            vogelcodes/portal-transp-worker:${{ github.sha }}
  deploy:
    needs: [build-web, build-worker]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl -X GET "https://panel.vps-br.vogelcodes.com/api/v1/services/d8pf1vvdt7jg0wdg96thh62r/restart?latest=true" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN2 }}" \
            -H "Content-Type: application/json" \
